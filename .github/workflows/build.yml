name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg,app
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        working-directory: tauri-app
        run: npm install --legacy-peer-deps

      - name: Install .NET SDK (Windows — for HardwareMonitor sidecar)
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build HardwareMonitor sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: HardwareMonitor/HardwareMonitor
        # Use -p: not /p: — Git Bash on Windows path-mangles /p:... into a
        # bogus path argument that dotnet treats as a project file (MSB1009).
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true
        shell: bash

      - name: Stage PresentMon assets into publish folder (Windows)
        if: matrix.platform == 'windows-latest'
        # The csproj's CopyPresentMon target writes to $(TargetDir)/native/,
        # not $(PublishDir)/. Tauri's resource globs read from publish/, so
        # presentmon.exe + ignored-processes.txt must land there explicitly.
        run: cp presentmon/* HardwareMonitor/HardwareMonitor/bin/Release/net8.0/win-x64/publish/
        shell: bash

      - name: List publish folder (Windows)
        if: matrix.platform == 'windows-latest'
        # Diagnostic — surfaces missing files (Tauri resource globs require
        # *.exe / *.dll / *.txt to match) so future breakage is obvious.
        run: ls -la HardwareMonitor/HardwareMonitor/bin/Release/net8.0/win-x64/publish/
        shell: bash

      - name: Sign Windows binaries
        if: matrix.platform == 'windows-latest'
        # Signs the bundled binaries (HardwareMonitor.exe, presentmon.exe)
        # before Tauri packages them into the installer. Tauri itself signs
        # the installer + main exe via tauri.conf.json's signCommand.
        #
        # Imports the PFX into the runner's CurrentUser cert store and
        # signs by thumbprint (signtool /sha1) rather than passing the PFX
        # password on the command line. GitHub Actions redacts secrets
        # from log output, but a /p <password> argument is still visible
        # in OS-level process listings (Process Monitor, ETW) for the
        # lifetime of the signtool call. Cert-store import keeps the
        # password off the command line entirely.
        #
        # No-op when WINDOWS_CERTIFICATE_BASE64 is unset (PR builds from
        # forks, local workflow_dispatch without secrets) so the build
        # continues to work unsigned for development.
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_BASE64) {
            Write-Host "WINDOWS_CERTIFICATE_BASE64 not set — skipping code signing."
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "code-signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))

          $securePassword = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certPath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $securePassword
          $thumbprint = $cert.Thumbprint
          # Drop the PFX from disk now that it's in the store. The
          # GitHub-hosted runner is ephemeral, but no point leaving it.
          Remove-Item $certPath -Force

          # Persist the thumbprint for the Tauri step that follows so its
          # signCommand can sign by thumbprint with no password on the
          # command line.
          "WINDOWS_CERTIFICATE_THUMBPRINT=$thumbprint" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          # signtool ships with the Windows SDK; locate the latest version
          # rather than relying on PATH (the GitHub-hosted runner image
          # changes its SDK version periodically).
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe not found on runner" }

          $publishDir = "HardwareMonitor/HardwareMonitor/bin/Release/net8.0/win-x64/publish"
          $targets = @("$publishDir/HardwareMonitor.exe", "$publishDir/presentmon.exe")
          foreach ($exe in $targets) {
            if (-not (Test-Path $exe)) {
              Write-Host "::warning::Sign target missing: $exe"
              continue
            }
            & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
              /sha1 $thumbprint $exe
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $exe" }
          }

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri's signCommand reads this thumbprint to sign the
          # installer + main exe via the cert imported in the step above.
          # When unset (no cert configured / non-Windows), the signCommand
          # wrapper detects the missing thumbprint and skips signing
          # rather than failing the build.
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ env.WINDOWS_CERTIFICATE_THUMBPRINT }}
        with:
          projectPath: tauri-app
          tagName: v__VERSION__
          releaseName: "CleanMeter v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: --bundles ${{ matrix.bundles }}
